<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINODONTO/AC — Guia de Convênios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: #f8fafc; 
        color: #334155; 
    }

    .glass-header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 3px solid #941b1b;
    }

    .card-partner {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .card-partner:hover {
        border-color: #941b1b;
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgba(148, 27, 27, 0.1);
    }

    .badge-discount {
        background: #941b1b;
        color: #ffffff;
        font-weight: 800;
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 8px;
        text-transform: uppercase;
    }

    .text-accent { color: #941b1b; }
    .bg-accent { background-color: #941b1b; }

    /* --- CONFIGURAÇÃO DE IMPRESSÃO COMPACTA (ECONOMIA DE PAPEL) --- */
    @media print {
        @page {
            size: portrait;
            margin: 0.8cm;
        }

        .no-print { display: none !important; }
        
        body { background-color: white !important; font-size: 10px !important; }

        /* Transforma em Grade de 3 Colunas para economizar páginas */
        .print-grid { 
            display: grid !important; 
            grid-template-columns: repeat(3, 1fr) !important; 
            gap: 8px !important; 
            width: 100% !important;
        }

        /* Card versão ultra compacta para papel */
        .card-partner { 
            border: 1px solid #e2e8f0 !important; 
            background: white !important; 
            padding: 8px !important; 
            margin: 0 !important;
            border-radius: 5px !important;
            break-inside: avoid; /* Não quebra um card no meio da página */
            box-shadow: none !important;
            display: block !important;
        }

        /* Ajuste de textos na impressão */
        .card-partner h4 { font-size: 11px !important; margin-bottom: 2px !important; color: black !important; }
        .card-partner p { font-size: 9px !important; line-height: 1.2 !important; margin-bottom: 4px !important; }
        
        /* Ajuste de Logo na impressão */
        .card-partner img { width: 30px !important; height: 30px !important; object-fit: contain !important; }
        .card-partner .w-16 { width: 30px !important; height: 30px !important; }

        /* Badge de desconto discreto */
        .badge-discount { 
            background: #eee !important; 
            color: black !important; 
            border: 1px solid #ccc !important;
            font-size: 8px !important;
            padding: 1px 4px !important;
        }

        /* Cabeçalhos de Cidades e Categorias mais baixos */
        .cid-group h2 { font-size: 16px !important; margin-top: 15px !important; margin-bottom: 5px !important; }
        .mb-14 { margin-bottom: 10px !important; }
        h3.text-accent { font-size: 9px !important; margin-bottom: 5px !important; }

        /* Links em preto para leitura fácil */
        .clickable-link { color: black !important; font-weight: bold !important; font-size: 9px !important; }
        .text-accent { color: black !important; }
    }
</style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="no-print sticky top-0 z-50 glass-header">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- Logotipo Sinodonto -->
                <img src="https://hplbefhrlxwiznncvglj.supabase.co/storage/v1/object/public/logos/1782511945706-jud6h.png" alt="Sinodonto AC" class="h-16 w-auto object-contain">
            </div>

            <div class="flex gap-4">
                <button onclick="toggleModal('modal-add')" class="text-slate-600 hover:text-red-800 text-xs font-black uppercase tracking-widest transition-all">
                    + Adicionar Convênio
                </button>
                <button onclick="window.print()" class="bg-red-900 text-white text-xs font-black px-6 py-3 rounded-xl hover:bg-red-800 transition-all shadow-lg uppercase tracking-wider">
                    Gerar PDF / Imprimir
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Intro e Busca -->
        <div class="no-print mb-12">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h2 class="text-slate-900 text-4xl font-black tracking-tighter mb-2 italic uppercase">Clube de Benefícios</h2>
                    <p class="text-slate-500 text-lg font-medium">O guia definitivo de parcerias para associados SINODONTO/AC.</p>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="inputBusca" onkeyup="filtrar()" placeholder="O que você procura?" 
                        class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-800 placeholder-slate-400 focus:border-red-800 outline-none transition-all shadow-sm">
                    <div id="stat-count" class="absolute right-6 top-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        0 cadastrados
                    </div>
                </div>
            </div>
        </div>

        <!-- Área de Listagem -->
        <div id="lista-parceiros" class="space-y-20">
            <div class="flex flex-col items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-900 mb-4"></div>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs italic">Sincronizando Banco de Dados...</p>
            </div>
        </div>
    </main>

    <!-- Modal de Cadastro -->
    <div id="modal-add" class="fixed inset-0 z-[100] hidden bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 no-print">
        <div class="w-full max-w-xl bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100 overflow-y-auto max-h-[90vh]">
            <form id="formAdd" onsubmit="handleUploadESalvar(event)" class="space-y-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-slate-900 text-2xl font-black uppercase italic tracking-tighter">Novo Convênio</h2>
                    <button type="button" onclick="toggleModal('modal-add')" class="text-slate-400 hover:text-red-900 text-3xl">✕</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Cidade</label>
                        <input type="text" id="pCidade" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Categoria</label>
                        <input type="text" id="pCategoria" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nome da Empresa / Parceiro</label>
                    <input type="text" id="pNome" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                </div>

                <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center bg-slate-50">
                    <input type="file" id="pLogoFile" accept="image/*" class="text-xs text-slate-500 mx-auto">
                    <p class="text-[9px] text-slate-400 mt-2 uppercase font-black tracking-widest">Logo (PNG ou JPG)</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Tag de Desconto</label>
                        <input type="text" id="pDesconto" placeholder="Ex: 15% OFF" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Telefone / WhatsApp</label>
                        <input type="text" id="pTelefone" placeholder="68 99999-9999" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Endereço para o Mapa</label>
                    <input type="text" id="pEndereco" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Resumo das Regras / Benefício</label>
                    <textarea id="pBeneficio" required rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-800 outline-none"></textarea>
                </div>
                
                <button type="submit" id="btnSalvar" class="w-full bg-red-900 text-white font-black py-5 rounded-2xl hover:bg-red-800 transition-all uppercase text-xs tracking-widest shadow-xl shadow-red-900/20">Salvar Convênio no Guia</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hplbefhrlxwiznncvglj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwbGJlZmhybHh3aXpubmN2Z2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDg3ODksImV4cCI6MjA5Nzk4NDc4OX0.cAqD3vNc9FqWC4OxoHw5DRJJr26N1QCVpkaUV6jezjQ";
        let DADOS_GLOBAIS = [];

        async function carregarDados() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/parceiros?select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                DADOS_GLOBAIS = await res.json();
                render(DADOS_GLOBAIS);
                document.getElementById('stat-count').innerText = `${DADOS_GLOBAIS.length} cadastrados`;
            } catch (err) {
                console.error("Erro ao carregar:", err);
            }
        }

        async function handleUploadESalvar(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "SINCRONIZANDO...";
            btn.disabled = true;
            
            const file = document.getElementById('pLogoFile').files[0];
            let logoUrl = '';

            if (file) {
                const fileName = `${Date.now()}-${file.name}`;
                const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/logos/${fileName}`, {
                    method: 'POST',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": file.type },
                    body: file
                });
                if (uploadRes.ok) logoUrl = `${SUPABASE_URL}/storage/v1/object/public/logos/${fileName}`;
            }

            const corpo = {
                cidade: document.getElementById('pCidade').value,
                categoria: document.getElementById('pCategoria').value,
                nome: document.getElementById('pNome').value,
                logo: logoUrl,
                tag_desconto: document.getElementById('pDesconto').value,
                beneficio: document.getElementById('pBeneficio').value,
                endereco: document.getElementById('pEndereco').value,
                telefone: document.getElementById('pTelefone').value
            };

            await fetch(`${SUPABASE_URL}/rest/v1/parceiros`, {
                method: 'POST',
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify(corpo)
            });

            toggleModal('modal-add');
            document.getElementById('formAdd').reset();
            btn.innerText = "Salvar Convênio no Guia";
            btn.disabled = false;
            carregarDados();
        }

        function render(dados) {
            const container = document.getElementById('lista-parceiros');
            container.innerHTML = '';

            const local = {};
            dados.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
                if(!local[p.cidade]) local[p.cidade] = {};
                if(!local[p.cidade][p.categoria]) local[p.cidade][p.categoria] = [];
                local[p.cidade][p.categoria].push(p);
            });

            for (const cid in local) {
                let html = `<div class="cid-group"><h2 class="text-slate-900 text-3xl font-black mb-8 flex items-center gap-6 italic tracking-tighter uppercase">${cid} <div class="h-[2px] flex-1 bg-slate-200"></div></h2>`;
                for (const cat in local[cid]) {
                    html += `<div class="mb-14"><h3 class="text-accent text-xs font-black uppercase tracking-[0.4em] mb-6 flex items-center gap-3">✦ ${cat}</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 print-grid gap-8">`;
                    local[cid][cat].forEach(p => {
                        
                        // Lógica de Telefone Inteligente
                        const rawPhone = p.telefone || '';
                        const cleanPhone = rawPhone.replace(/\D/g, '');
                        let phoneLink = '';
                        
                        // Celular/Zap (11 dígitos ou começa com 9)
                        if (cleanPhone.length >= 11 || (cleanPhone.length === 9 && cleanPhone.startsWith('9'))) {
                            phoneLink = `https://wa.me/55${cleanPhone}`;
                        } else if (cleanPhone.length > 0) {
                            phoneLink = `tel:+55${cleanPhone}`;
                        }

                        // Link Automático para Google Maps
                        const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nome + ' ' + p.endereco + ' ' + p.cidade)}`;

                        html += `
                        <div class="card-partner rounded-[2.5rem] p-8 flex flex-col justify-between group bg-white relative">
                            <div>
                                <div class="flex justify-between items-start mb-6">
                                    <div class="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center overflow-hidden border border-slate-100 shadow-sm">
                                        ${p.logo ? `<img src="${p.logo}" class="w-full h-full object-contain p-1">` : `<span class="text-slate-200 text-[10px] font-black tracking-tighter">LOGO</span>`}
                                    </div>
                                    <span class="badge-discount">${p.tag_desconto}</span>
                                </div>
                                <h4 class="text-slate-900 font-bold text-xl mb-4 leading-tight tracking-tight">${p.nome}</h4>
                                <p class="text-slate-500 text-sm leading-relaxed mb-8 font-medium italic italic">"${p.beneficio}"</p>
                            </div>
                            
                            <div class="space-y-5 pt-6 border-t border-slate-50">
                                <a href="${mapsLink}" target="_blank" class="clickable-link block group/link no-underline">
                                    <p class="text-base text-slate-600 flex items-start gap-3">
                                        <span class="text-accent text-xl">📍</span> 
                                        <span class="leading-snug font-bold group-hover/link:text-red-900 transition-colors uppercase text-sm">${p.endereco || 'Consultar Unidade'}</span>
                                    </p>
                                </a>

                                <div class="flex justify-between items-center">
                                    <a href="${phoneLink}" target="_blank" class="clickable-link group/link no-underline">
                                        <p class="text-xl text-slate-800 flex items-center gap-3 font-black tracking-tighter group-hover/link:text-red-900 transition-colors">
                                            <span class="text-accent text-xl">📞</span> ${p.telefone || 'Sede/Sinodonto'}
                                        </p>
                                    </a>
                                    <button onclick="deletar(${p.id})" class="no-print opacity-0 group-hover:opacity-100 text-red-500 text-[9px] font-black uppercase hover:underline transition-all">Remover</button>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                }
                container.innerHTML += html + `</div>`;
            }
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        async function deletar(id) { if(confirm("Deseja realmente remover este convênio permanentemente?")) { await fetch(`${SUPABASE_URL}/rest/v1/parceiros?id=eq.${id}`, { method: 'DELETE', headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }); carregarDados(); } }
        function filtrar() { const termo = document.getElementById('inputBusca').value.toLowerCase(); const f = DADOS_GLOBAIS.filter(p => p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo) || p.cidade.toLowerCase().includes(termo)); render(f); }

        window.onload = carregarDados;
    </script>
</body>
</html>
