<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Convênios — SINODONTO/AC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 3px solid #941b1b; }
    .card-partner { background: #ffffff; border: 1px solid #e2e8f0; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .card-partner:hover { border-color: #941b1b; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(148, 27, 27, 0.1); }
    .badge-discount { background: #941b1b; color: #ffffff; font-weight: 800; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
    .text-accent { color: #941b1b; }

    @media print {
        @page { size: portrait; margin: 0.8cm; }
        .no-print { display: none !important; }
        body { background-color: white !important; font-size: 10pt !important; }
        .print-banner { display: flex !important; justify-content: space-between; align-items: center; border-bottom: 2px solid #941b1b; padding-bottom: 10px; margin-bottom: 15px; }
        .print-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px 20px !important; }
        .card-partner { border: none !important; border-bottom: 1px solid #f1f5f9 !important; padding: 8px 0 !important; box-shadow: none !important; break-inside: avoid; }
        .card-partner h4 { font-size: 11pt !important; font-weight: 800 !important; color: #000 !important; margin-bottom: 2px !important; text-transform: uppercase; }
        .card-partner p.beneficio-txt { font-size: 8.5pt !important; line-height: 1.2 !important; margin-bottom: 5px !important; color: #444 !important; }
        .card-partner .info-contato { font-size: 9pt !important; font-weight: 600 !important; color: #1e293b !important; text-decoration: none !important; }
        .logo-container { display: none !important; }
        .badge-discount { background: #f8fafc !important; color: #941b1b !important; border: 1px solid #941b1b !important; font-size: 7.5pt !important; padding: 1px 4px !important; float: right; }
        .cid-group h2 { font-size: 14pt !important; font-weight: 900 !important; margin-top: 20px !important; border-bottom: 1.5px solid #000 !important; }
        h3.text-accent { font-size: 9pt !important; margin: 8px 0 4px 0 !important; }
        .clickable-link { text-decoration: none !important; color: #1e293b !important; }
    }
</style>
</head>
<body class="antialiased">

    <div class="hidden print:flex print-banner">
        <img src="https://hplbefhrlxwiznncvglj.supabase.co/storage/v1/object/public/logos/1782511945706-jud6h.png" class="h-10">
        <div class="text-right">
            <h1 class="text-lg font-black text-red-900 uppercase italic">Guia de Convênios Sinodonto/AC</h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Links ativos no PDF</p>
        </div>
    </div>

    <header class="no-print sticky top-0 z-50 glass-header">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="https://hplbefhrlxwiznncvglj.supabase.co/storage/v1/object/public/logos/1782511945706-jud6h.png" alt="Sinodonto AC" class="h-16 w-auto object-contain">
            <div class="flex gap-4">
                <button onclick="abrirNovo()" class="text-slate-600 hover:text-red-800 text-xs font-bold uppercase tracking-widest transition-all">+ Novo Parceiro</button>
                <button onclick="window.print()" class="bg-red-900 text-white text-xs font-black px-6 py-3 rounded-xl hover:bg-red-800 shadow-lg uppercase italic tracking-wider">Gerar Guia PDF</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="no-print mb-12">
            <h2 class="text-slate-900 text-5xl font-black tracking-tighter mb-2 italic uppercase">Clube de Benefícios</h2>
            <div class="relative max-w-xl mt-6">
                <input type="text" id="inputBusca" onkeyup="filtrar()" placeholder="Pesquisar..." class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 outline-none focus:border-red-900 shadow-sm">
                <div id="stat-count" class="absolute right-6 top-5 text-[10px] font-black text-slate-400 uppercase">0 cadastrados</div>
            </div>
        </div>
        <div id="lista-parceiros" class="space-y-16">
            <div class="text-center py-20 animate-pulse font-bold text-slate-400 uppercase text-xs italic">Sincronizando Banco de Dados...</div>
        </div>
    </main>

    <!-- Modal Cadastro / Edição -->
    <div id="modal-add" class="fixed inset-0 z-[100] hidden bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 no-print">
        <div class="w-full max-w-xl bg-white rounded-[2.5rem] shadow-2xl p-8 max-h-[90vh] overflow-y-auto">
            <form id="formAdd" onsubmit="handleUploadESalvar(event)" class="space-y-5">
                <input type="hidden" id="editId"> <!-- CAMPO OCULTO PARA ID -->
                <div class="flex justify-between items-center mb-4">
                    <h2 id="modalTitle" class="text-2xl font-black italic uppercase">Novo Parceiro</h2>
                    <button type="button" onclick="toggleModal('modal-add')" class="text-3xl">✕</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="pCidade" placeholder="Cidade" required class="bg-slate-50 border p-3 rounded-xl outline-none focus:border-red-900 text-sm">
                    <input type="text" id="pCategoria" placeholder="Categoria" required class="bg-slate-50 border p-3 rounded-xl outline-none focus:border-red-900 text-sm">
                </div>
                <input type="text" id="pNome" placeholder="Nome da Empresa" required class="w-full bg-slate-50 border p-3 rounded-xl focus:border-red-900 text-sm">
                <div class="border-2 border-dashed border-slate-200 p-4 rounded-xl text-center">
                    <input type="file" id="pLogoFile" accept="image/*" class="text-xs">
                    <p id="txtLogoStatus" class="text-[10px] text-slate-400 mt-1 uppercase font-bold"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="pDesconto" placeholder="Ex: 15% OFF" required class="bg-slate-50 border p-3 rounded-xl text-sm">
                    <input type="text" id="pTelefone" placeholder="WhatsApp / Telefone" class="bg-slate-50 border p-3 rounded-xl text-sm">
                </div>
                <input type="text" id="pEndereco" placeholder="Endereço" class="w-full bg-slate-50 border p-3 rounded-xl text-sm">
                <textarea id="pBeneficio" placeholder="Regras..." required rows="3" class="w-full bg-slate-50 border p-3 rounded-xl text-sm"></textarea>
                <button type="submit" id="btnSalvar" class="w-full bg-red-900 text-white font-black py-4 rounded-xl uppercase shadow-xl">Confirmar Alterações</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hplbefhrlxwiznncvglj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwbGJlZmhybHh3aXpubmN2Z2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDg3ODksImV4cCI6MjA5Nzk4NDc4OX0.cAqD3vNc9FqWC4OxoHw5DRJJr26N1QCVpkaUV6jezjQ";
        let DADOS_GLOBAIS = [];
        let currentLogoUrl = '';

        async function carregarDados() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/parceiros?select=*`, { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
            DADOS_GLOBAIS = await res.json();
            render(DADOS_GLOBAIS);
            document.getElementById('stat-count').innerText = `${DADOS_GLOBAIS.length} cadastrados`;
        }

        function abrirNovo() {
            document.getElementById('formAdd').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = "Novo Parceiro";
            document.getElementById('txtLogoStatus').innerText = "LOGO (PNG/JPG)";
            currentLogoUrl = '';
            toggleModal('modal-add');
        }

        function abrirEditar(id) {
            const p = DADOS_GLOBAIS.find(x => x.id === id);
            if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('pCidade').value = p.cidade;
            document.getElementById('pCategoria').value = p.categoria;
            document.getElementById('pNome').value = p.nome;
            document.getElementById('pDesconto').value = p.tag_desconto;
            document.getElementById('pTelefone').value = p.telefone;
            document.getElementById('pEndereco').value = p.endereco;
            document.getElementById('pBeneficio').value = p.beneficio;
            document.getElementById('modalTitle').innerText = "Editar Parceiro";
            document.getElementById('txtLogoStatus').innerText = p.logo ? "Possui Logo (escolha outro para trocar)" : "Sem Logo cadastrado";
            currentLogoUrl = p.logo || '';
            toggleModal('modal-add');
        }

        async function handleUploadESalvar(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const id = document.getElementById('editId').value;
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            const file = document.getElementById('pLogoFile').files[0];
            let logoUrl = currentLogoUrl;

            if (file) {
                const fileName = `${Date.now()}-${file.name}`;
                const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/logos/${fileName}`, { 
                    method: 'POST', 
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": file.type }, 
                    body: file 
                });
                if (uploadRes.ok) logoUrl = `${SUPABASE_URL}/storage/v1/object/public/logos/${fileName}`;
            }

            const corpo = { 
                cidade: document.getElementById('pCidade').value, 
                categoria: document.getElementById('pCategoria').value, 
                nome: document.getElementById('pNome').value, 
                logo: logoUrl, 
                tag_desconto: document.getElementById('pDesconto').value, 
                beneficio: document.getElementById('pBeneficio').value, 
                endereco: document.getElementById('pEndereco').value, 
                telefone: document.getElementById('pTelefone').value 
            };

            const url = id ? `${SUPABASE_URL}/rest/v1/parceiros?id=eq.${id}` : `${SUPABASE_URL}/rest/v1/parceiros`;
            const metodo = id ? 'PATCH' : 'POST';

            await fetch(url, {
                method: metodo,
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
                body: JSON.stringify(corpo)
            });

            toggleModal('modal-add'); carregarDados(); btn.disabled = false; btn.innerText = "Confirmar Alterações";
        }

        function render(dados) {
            const container = document.getElementById('lista-parceiros'); container.innerHTML = '';
            const local = {};
            dados.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
                if(!local[p.cidade]) local[p.cidade] = {};
                if(!local[p.cidade][p.categoria]) local[p.cidade][p.categoria] = [];
                local[p.cidade][p.categoria].push(p);
            });

            for (const cid in local) {
                let html = `<div class="cid-group"><h2 class="text-slate-900 text-3xl font-black mb-8 flex items-center gap-6 italic uppercase tracking-tighter">${cid} <div class="h-[2px] flex-1 bg-slate-200"></div></h2>`;
                for (const cat in local[cid]) {
                    html += `<div class="mb-14"><h3 class="text-accent text-xs font-black uppercase tracking-[0.3em] mb-6 flex items-center gap-3">✦ ${cat}</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 print-grid gap-8">`;
                    local[cid][cat].forEach(p => {
                        const cleanPhone = (p.telefone || '').split(/[/,]/)[0].replace(/\D/g, '');
                        let phoneLink = (cleanPhone.length >= 8) ? ((cleanPhone.length >= 10 && (cleanPhone[2] == '9' || cleanPhone[0] == '9')) ? 'https://wa.me/55'+cleanPhone : 'tel:+55'+cleanPhone) : '#';
                        const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nome + ' ' + (p.endereco || '') + ' ' + p.cidade)}`;
                        const logoSrc = p.logo ? p.logo : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.nome)}&background=f1f5f9&color=941b1b&size=128&font-size=0.35&bold=true`;

                        html += `
                        <div class="card-partner rounded-[2.5rem] p-8 flex flex-col justify-between group bg-white relative">
                            <div>
                                <div class="flex justify-between items-start mb-6 no-print">
                                    <div class="logo-container w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center overflow-hidden border border-slate-100 shadow-sm">
                                        <img src="${logoSrc}" class="w-full h-full object-contain p-1">
                                    </div>
                                    <div class="flex flex-col items-end gap-2">
                                        <span class="badge-discount">${p.tag_desconto}</span>
                                        <button onclick="abrirEditar(${p.id})" class="text-[14px] font-black text-slate-600 hover:text-red-900 uppercase">📝 Editar</button>
                                    </div>
                                </div>
                                <h4 class="text-slate-900 font-bold text-xl mb-4 leading-tight tracking-tight uppercase">${p.nome} <span class="hidden print:inline-block badge-discount ml-2">${p.tag_desconto}</span></h4>
                                <p class="text-slate-500 text-sm leading-relaxed mb-8 font-medium italic beneficio-txt">"${p.beneficio}"</p>
                            </div>
                            <div class="space-y-4 pt-6 border-t border-slate-50">
                                <a href="${mapsLink}" target="_blank" class="clickable-link block no-underline info-contato">
                                    <span class="no-print">📍</span> ${p.endereco || 'Consultar Unidade'}
                                </a>
                                <div class="flex justify-between items-center">
                                    <a href="${phoneLink}" target="_blank" class="clickable-link no-underline info-contato">
                                        <span class="no-print">📞</span> ${p.telefone || 'Sede'}
                                    </a>
                                    <button onclick="deletar(${p.id})" class="no-print opacity-0 group-hover:opacity-100 text-red-500 text-[14px] font-black uppercase">Remover</button>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                }
                container.innerHTML += html + `</div>`;
            }
        }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        async function deletar(id) { if(confirm("Remover permanentemente?")) { await fetch(`${SUPABASE_URL}/rest/v1/parceiros?id=eq.${id}`, { method: 'DELETE', headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }); carregarDados(); } }
        function filtrar() { const t = document.getElementById('inputBusca').value.toLowerCase(); render(DADOS_GLOBAIS.filter(p => p.nome.toLowerCase().includes(t) || p.categoria.toLowerCase().includes(t) || p.cidade.toLowerCase().includes(t))); }
        window.onload = carregarDados;
    </script>
</body>
</html>
