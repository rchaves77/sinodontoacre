<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Parceiros - SINODONTO/AC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #070B19; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 3px; }

        /* Bloqueia o fundo branco do navegador e força o Modo Escuro Real no PDF */
        @media print {
            :root {
                color-scheme: dark !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            @page { 
                size: portrait; 
                margin: 0.8cm 1cm;
            }
            
            /* Força a renderização exata de cores de fundo, gradientes e sombras */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body { 
                background-color: #070B19 !important; 
                color: #d1d5db !important; 
                font-size: 11px !important;
            }

            .no-print { display: none !important; }
            .page-break-section { page-break-inside: auto !important; }
            
            /* Estrutura compacta em Linhas/Tabela para economizar folhas */
            .print-grid { display: block !important; }
            .card-premium { 
                display: grid !important;
                grid-template-columns: 2.5fr 1.2fr 5fr 2.5fr; 
                border: none !important;
                border-bottom: 1px solid #1e293b !important;
                border-radius: 0 !important;
                background-color: #0f1524 !important; 
                color: #d1d5db !important; 
                padding: 6px 8px !important; 
                margin: 0 !important;
                page-break-inside: avoid !important;
            }
            
            /* Títulos e Elementos do PDF Escuro */
            h3 { font-size: 16px !important; color: #ffffff !important; margin-top: 14px !important; margin-bottom: 6px !important; border-bottom: 2px solid #f59e0b !important; padding-bottom: 4px !important; }
            h4 { font-size: 12px !important; color: #f59e0b !important; margin-top: 8px !important; margin-bottom: 4px !important; }
            h5 { font-size: 12px !important; color: #ffffff !important; font-weight: 600 !important; }
            
            .tag-beneficio { background-color: rgba(16, 185, 129, 0.1) !important; border: 1px solid rgba(16, 185, 129, 0.3) !important; color: #10b981 !important; font-weight: 700 !important; padding: 1px 4px !important; }
            .texto-descricao { color: #9ca3af !important; font-size: 11px !important; line-height: 1.3 !important; margin: 0 !important; }
            .logo-container { display: none !important; } 
            .texto-rodape { border: none !important; padding: 0 !important; color: #9ca3af !important; }
        }
    </style>
</head>
<body class="bg-[#070B19] text-gray-300 min-h-screen antialiased">

    <div class="hidden print:flex flex-row justify-between items-center border-b-2 border-yellow-500 bg-[#0f1524] p-4 rounded-xl mb-4 w-full">
        <div class="flex items-center gap-3">
            <svg class="h-8 w-8 text-yellow-500 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #f59e0b !important;"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <div>
                <h1 class="text-base font-bold text-white tracking-wide">SINODONTO / AC</h1>
                <p class="text-[9px] text-gray-400 uppercase tracking-widest font-medium">Guia de Convênios Corporativos Benefícios</p>
            </div>
        </div>
        <span id="print-data" class="text-[10px] text-gray-400 font-medium"></span>
    </div>

    <header class="no-print border-b border-gray-800 bg-[#070B19] sticky top-0 z-50 py-4 shadow-2xl">
        <div class="max-w-7xl mx-auto px-6 flex flex-col lg:flex-row justify-between items-center gap-6">
            
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 bg-gradient-to-tr from-yellow-500 to-yellow-700 p-0.5 rounded-xl shadow-lg flex items-center justify-center flex-shrink-0">
                    <div class="w-full h-full bg-[#070B19] rounded-xl flex items-center justify-center">
                        <svg class="h-7 w-7 text-yellow-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                </div>
                <div class="border-l border-gray-800 pl-4 py-1">
                    <h1 class="text-xl font-bold text-white tracking-wide">SINODONTO / AC</h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold mt-0.5">Painel em Tempo Real (Banco de Dados)</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2.5 justify-center items-center">
                <button onclick="abrirFormulario()" class="bg-yellow-500 hover:bg-yellow-400 text-gray-950 text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-lg uppercase tracking-wider">
                    ➕ Novo Parceiro
                </button>
                <button onclick="gerarPDF()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2.5 rounded-xl border border-blue-500 shadow-lg uppercase tracking-wider">
                    📄 Exportar PDF Compacto
                </button>
                <button onclick="exportarBackupJSON()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2.5 rounded-xl border border-emerald-500 shadow-lg uppercase tracking-wider">
                    💾 Salvar Backup (.JSON)
                </button>
                <label class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-bold px-4 py-2.5 rounded-xl border border-gray-700 shadow-lg cursor-pointer text-center uppercase tracking-wider">
                    📂 Abrir Arquivo Local
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importarEEnviarParaNuvem(event)">
                </label>
            </div>

        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 pt-24">
        
        <div id="formulario-cadastro" class="hidden no-print bg-[#0F1524] border border-gray-800 rounded-2xl p-6 mb-12 max-w-xl mx-auto shadow-2xl">
            <h3 class="text-base font-bold text-white mb-5 border-b border-gray-800 pb-2 uppercase tracking-wider text-xs text-yellow-400">📝 Cadastro de Convênio</h3>
            <form id="formParceiro" onsubmit="salvarParceiro(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Cidade *</label>
                        <input type="text" id="pCidade" placeholder="Ex: Rio Branco" required class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Categoria *</label>
                        <input type="text" id="pCategoria" placeholder="Ex: Academias" required class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Nome da Empresa *</label>
                    <input type="text" id="pNome" placeholder="Ex: COLISEU Academia" required class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Logo do Parceiro (Opcional)</label>
                    <input type="file" id="pLogoFile" accept="image/*" class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-2 py-2 text-xs text-gray-400 file:mr-3 file:py-1 file:px-2.5 file:rounded-md file:bg-gray-800 file:text-white file:border-0 hover:file:bg-gray-700 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Texto de Desconto Curto *</label>
                        <input type="text" id="pDesconto" placeholder="Ex: 15% OFF" required class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Telefone / Contato</label>
                        <input type="text" id="pTelefone" placeholder="Ex: 68 2102-5573" class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Endereço Completo</label>
                    <input type="text" id="pEndereco" placeholder="Ex: Rua Jambo, 76" class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Regras Completas do Benefício *</label>
                    <textarea id="pBeneficio" rows="3" placeholder="Detalhes do desconto..." required class="w-full bg-[#070B19] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-yellow-500 focus:outline-none transition"></textarea>
                </div>
                <div class="flex justify-end gap-2.5 pt-2">
                    <button type="button" onclick="fecharFormulario()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition">CANCELAR</button>
                    <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-white px-5 py-2 rounded-xl text-xs font-bold transition">SALVAR ONLINE</button>
                </div>
            </form>
        </div>

        <div id="lista-dinamica-parceiros" class="space-y-12">
            <p class="text-center text-gray-500 text-lg">Conectando ao banco de dados em nuvem...</p>
        </div>
        
    </main>

    <script>
        const SUPABASE_URL = "https://hplbefhrlxwiznncvglj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwbGJlZmhybHh3aXpubmN2Z2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDg3ODksImV4cCI6MjA5Nzk4NDc4OX0.cAqD3vNc9FqWC4OxoHw5DRJJr26N1QCVpkaUV6jezjQ";

        let listaParceirosGlobal = [];

        window.onload = function() {
            document.getElementById('print-data').innerText = `Atualizado em: ${new Date().toLocaleDateString('pt-BR')}`;
            puxarDadosBanco();
        };

        function abrirFormulario() { document.getElementById('formulario-cadastro').classList.remove('hidden'); }
        function fecharFormulario() { document.getElementById('formulario-cadastro').classList.add('hidden'); document.getElementById('formParceiro').reset(); }

        async function puxarDadosBanco() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/parceiros?select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                listaParceirosGlobal = await response.json();
                renderizarTela(listaParceirosGlobal);
            } catch (err) {
                document.getElementById('lista-dinamica-parceiros').innerHTML = '<p class="text-center text-red-400">Falha na conexão com o banco de dados remoto.</p>';
            }
        }

        function salvarParceiro(e) {
            e.preventDefault();
            const file = document.getElementById('pLogoFile').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { enviarParaNuvem(event.target.result); };
                reader.readAsDataURL(file);
            } else { enviarParaNuvem(''); }
        }

        async function enviarParaNuvem(logoBase64) {
            const corpoData = {
                cidade: document.getElementById('pCidade').value.trim(),
                categoria: document.getElementById('pCategoria').value.trim(),
                nome: document.getElementById('pNome').value.trim(),
                logo: logoBase64,
                tag_desconto: document.getElementById('pDesconto').value.trim(),
                beneficio: document.getElementById('pBeneficio').value.trim(),
                endereco: document.getElementById('pEndereco').value.trim() || 'Não informado',
                telefone: document.getElementById('pTelefone').value.trim() || 'Não informado'
            };

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/parceiros`, {
                    method: 'POST',
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(corpoData)
                });
                fecharFormulario();
                puxarDadosBanco();
            } catch { alert("Erro ao salvar dados online."); }
        }

        async function importarEEnviarParaNuvem(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const dados = JSON.parse(e.target.result);
                    const arrayParceiros = dados.parceiros || dados;
                    
                    if (Array.isArray(arrayParceiros) && arrayParceiros.length > 0) {
                        document.getElementById('lista-dinamica-parceiros').innerHTML = `<p class="text-center text-yellow-400 text-lg">Subindo ${arrayParceiros.length} parceiros para a nuvem...</p>`;
                        
                        for (let p of arrayParceiros) {
                            const limpo = {
                                cidade: p.cidade, categoria: p.categoria, nome: p.nome,
                                logo: p.logo || '', tag_desconto: p.tag_desconto || p.desconto || 'Desconto',
                                beneficio: p.beneficio || p.detalhes, endereco: p.endereco, telefone: p.telefone
                            };
                            await fetch(`${SUPABASE_URL}/rest/v1/parceiros`, {
                                method: 'POST',
                                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                                body: JSON.stringify(limpo)
                            });
                        }
                        alert("Migração concluída com sucesso!");
                        puxarDadosBanco();
                    }
                } catch { alert("Arquivo inválido."); puxarDadosBanco(); }
            };
            reader.readAsText(file);
        }

        async function deletarParceiro(id) {
            if(!confirm("Deseja deletar este convênio permanentemente na nuvem para todos?")) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/parceiros?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                puxarDadosBanco();
            } catch { alert("Erro ao excluir parceiro online."); }
        }

        function gerarPDF() { window.print(); }

        function exportarBackupJSON() {
            const backup = { dataAtualizacao: new Date().toLocaleDateString('pt-BR'), parceiros: listaParceirosGlobal };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `LISTA_DE_PARCEIROS_NUVEM.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function renderizarTela(dados) {
            const container = document.getElementById('lista-dinamica-parceiros');
            container.innerHTML = '';

            if (!dados || dados.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-12 text-lg font-medium">Nenhum parceiro carregado no banco de dados.</p>';
                return;
            }

            const locais = {};
            dados.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(item => {
                if (!locais[item.cidade]) locais[item.cidade] = {};
                if (!locais[item.cidade][item.categoria]) locais[item.cidade][item.categoria] = [];
                locais[item.cidade][item.categoria].push(item);
            });

            for (const cidade in locais) {
                let htmlCidade = `
                    <section class="page-break-section">
                        <div class="flex items-center gap-3 mb-4 border-b border-gray-800 pb-1.5">
                            <h3 class="text-2xl font-bold text-white tracking-wide">🏙️ ${cidade}</h3>
                        </div>
                `;

                for (const categoria in locais[cidade]) {
                    htmlCidade += `
                        <div class="mb-5 page-break-section">
                            <h4 class="text-sm font-bold text-yellow-500 mb-3 tracking-widest uppercase">
                                ✦ ${categoria}
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 print-grid gap-5">
                    `;

                    locais[cidade][categoria].forEach(p => {
                        const logoHTML = p.logo 
                            ? `<img src="${p.logo}" alt="Logo" class="h-11 w-11 rounded-xl object-contain bg-white border border-gray-800 p-1 flex-shrink-0">`
                            : `<div class="h-11 w-11 rounded-xl bg-gray-800 flex items-center justify-center font-bold text-xs text-gray-400 flex-shrink-0 border border-gray-700">💼</div>`;

                        htmlCidade += `
                            <div class="card-premium page-break-card bg-[#0F1524] border border-gray-800 rounded-2xl p-5 flex flex-col justify-between relative group hover:border-gray-700 transition-all duration-300 shadow-xl">
                                <button onclick="deletarParceiro(${p.id})" class="no-print absolute top-3 right-3 text-gray-500 hover:text-red-400 text-[10px] font-bold bg-[#070B19] px-2 py-1 rounded-lg opacity-0 group-hover:opacity-100 transition-all duration-200">
                                    🗑️ Excluir
                                </button>
                                <div>
                                    <div class="flex items-center gap-3.5 mb-3.5">
                                        <div class="logo-container">${logoHTML}</div>
                                        <div class="flex-1 min-w-0">
                                            <h5 class="font-semibold text-white text-lg leading-tight truncate tracking-wide">${p.nome}</h5>
                                            <span class="tag-beneficio inline-block bg-green-500 text-green-400 text-sm font-bold px-2.5 py-0.5 rounded-lg border border-green-500 mt-1 bg-opacity-5 border-opacity-20">${p.tag_desconto}</span>
                                        </div>
                                    </div>
                                    <p class="texto-descricao text-base text-gray-300 leading-relaxed mb-4">${p.beneficio}</p>
                                </div>
                                <div class="texto-rodape border-t border-gray-800 pt-3 text-sm text-gray-400 space-y-1 font-medium">
                                    <p class="truncate item-contato">📍 ${p.endereco}</p>
                                    <p class="item-contato">📞 ${p.telefone}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlCidade += `</div></div>`;
                }
                htmlCidade += `</section>`;
                container.innerHTML += htmlCidade;
            }
        }
    </script>
</body>
</html>
